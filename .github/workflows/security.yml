---
name: CVE Analysis

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch: {}

jobs:
  analyze:
    name: Upstream Images Scan
    runs-on: ubuntu-latest
    environment: "open source"

    permissions:
      contents: read
      pull-requests: write

    env:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PAT }}

      - name: Scan FrankenPHP Upstream
        uses: docker/scout-action@v1
        with:
          command: cves
          image: dunglas/frankenphp:1-php8.5
          only-severities: critical,high
          exit-code: false
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output: frankenphp-report.md

      - name: Scan Debian Base
        uses: docker/scout-action@v1
        with:
          command: cves
          image: debian:13-slim
          only-severities: critical,high
          exit-code: false
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output: debian-report.md

      - name: Publish Results to Summary
        if: always()
        run: |
          echo "# 🛡️ CVE Analysis Report" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🐘 FrankenPHP Upstream" >> "$GITHUB_STEP_SUMMARY"
          cat frankenphp-report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "⚠️ No FrankenPHP report generated." >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "## 🐧 Debian Base" >> "$GITHUB_STEP_SUMMARY"
          cat debian-report.md >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || echo "⚠️ No Debian report generated." >> "$GITHUB_STEP_SUMMARY"