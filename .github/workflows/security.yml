---
name: Security Scan

on:
  push:
    branches: [main, dev]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    environment: "open source"

    env:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PAT }}

      - name: Scan FrankenPHP Upstream
        uses: docker/scout-action@v1
        with:
          command: cves
          image: dunglas/frankenphp:1-php8.5
          only-severities: critical,high
          exit-code: false
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output: frankenphp-report.md

      - name: Add CVEs frankenphp report to Actions Summary
        run: cat frankenphp-report.md >> $GITHUB_STEP_SUMMARY

      - name: Scan Debian Prod Base
        uses: docker/scout-action@v1
        with:
          command: cves
          image: debian:13-slim
          only-severities: critical,high
          exit-code: false
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output: debian-report.md

      - name: Add CVEs debien report to Actions Summary
        run: cat debian-report.md >> $GITHUB_STEP_SUMMARY