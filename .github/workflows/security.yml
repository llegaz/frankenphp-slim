---
name: CVE Analysis

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]
  workflow_dispatch: {}

jobs:
  analyze:
    name: Upstream Images Scan
    runs-on: ubuntu-latest
    environment: "open source"

    permissions:
      contents: read
      pull-requests: write

    env:
      DOCKER_USER: ${{ secrets.DOCKER_USER }}
      DOCKER_PAT: ${{ secrets.DOCKER_PAT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USER }}
          password: ${{ env.DOCKER_PAT }}

      - name: Scan FrankenPHP Upstream
        uses: docker/scout-action@v1
        with:
          command: cves
          image: dunglas/frankenphp:1-php8.5
          only-severities: critical,high
          exit-code: false
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output: frankenphp-report.md

      - name: Scan Debian Base
        uses: docker/scout-action@v1
        with:
          command: cves
          image: debian:13-slim
          only-severities: critical,high
          exit-code: false
          write-comment: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          output: debian-report.md

      - name: Publish Results to Summary
        if: always()
        run: |
          echo "# 🛡️ CVE Analysis Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "Scan performed on $(date +'%Y-%m-%d %H:%M')" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -s frankenphp-report.md ]; then
            echo "## 🐘 FrankenPHP Upstream" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat frankenphp-report.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -s debian-report.md ]; then
            echo "## 🐧 Debian Base" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            cat debian-report.md >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ ! -s frankenphp-report.md ] && [ ! -s debian-report.md ]; then
            echo "> ✅ Reports were integrated directly by Docker Scout above." >> "$GITHUB_STEP_SUMMARY"
          fi